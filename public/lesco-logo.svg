<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 95" width="280" height="95">
  <!-- L -->
  <text x="0" y="65" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="700" fill="#808080" letter-spacing="-1">L</text>
  <!-- E -->
  <text x="38" y="65" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="700" fill="#808080" letter-spacing="-1">E</text>
  <!-- S -->
  <text x="80" y="65" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="700" fill="#808080" letter-spacing="-1">S</text>
  <!-- C -->
  <text x="118" y="65" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="700" fill="#808080" letter-spacing="-1">C</text>

  <!-- Stylized O with hummingbird -->
  <g transform="translate(156, 4)">
    <!-- O circle (open ring) -->
    <circle cx="30" cy="30" r="26" fill="none" stroke="#76a493" stroke-width="9"/>

    <!-- Hummingbird beak - two thin lines extending upper-right -->
    <path d="M 48 20 Q 56 16 78 14 Q 60 20 50 24 Z" fill="#76a493"/>
    <path d="M 50 24 Q 58 22 74 20 Q 58 26 48 26 Z" fill="#76a493"/>

    <!-- Hummingbird body - passes through right of O -->
    <path d="M 44 28 Q 50 32 48 40 Q 46 46 42 50 L 38 46 Q 42 40 42 34 Q 42 30 44 28 Z" fill="#76a493"/>

    <!-- Tail flowing down in large S-curve below O -->
    <path d="M 42 50 Q 46 54 44 62 Q 40 72 32 80 Q 24 88 16 86 Q 10 82 14 74 Q 18 66 24 60 Q 28 56 30 50 Q 32 46 38 46 Z" fill="#76a493"/>
  </g>

  <!-- ® symbol -->
  <g transform="translate(240, 0)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#808080" stroke-width="1.2"/>
    <text x="5" y="14.5" font-family="'Georgia', serif" font-size="14" fill="#808080" font-weight="400">R</text>
  </g>
</svg>
